version: '3.8'

services:
  # MySQL 数据库
  db:
    image: mysql:8.0
    container_name: campus-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: campus123456
      MYSQL_DATABASE: campus_secondhand
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - campus-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Node.js 后端服务
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: campus-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=campus123456
      - DB_NAME=campus_secondhand
    volumes:
      - uploads_data:/app/server/uploads
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - campus-network

  # Nginx 前端服务
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: campus-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - campus-network

networks:
  campus-network:
    driver: bridge

volumes:
  mysql_data:
  uploads_data:
